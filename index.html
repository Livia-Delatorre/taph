 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taphros</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
 
 <section class="hero">
        
        <div class="hero-background">
            <div class="gradient-bg"></div>
            <div class="particles-container" id="particles"></div>
            <div class="floating-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
                <div class="shape shape-4"></div>
                <div class="shape shape-5"></div>
                <div class="shape shape-6"></div>
            </div>
        </div>

     
        <div class="hero-content">
            <div class="hero-text">
                <h1 class="hero-title">
                    <span class="title-line">Conheça a</span>
                    <span class="title-line">Taphros Drone Systems</span>
                </h1>
                <p class="hero-description">
                    Saiba mais sobre o nosso projeto com foco em desenvolvimento de drones quadrimotores, pesquisas em inteligência artificial e automação, e participação em competições nacionais. 
                    Junte-se a nós para explorar o futuro da tecnologia e inovação!
                </p>
                <div class="hero-buttons">
                    <button class="btn btn-primary">História</button>
                    <button class="btn btn-secondary">Saiba mais</button>
                </div>
            </div>
            
           
            <div class="hero-visual">
    <div class="drone-container" id="droneContainer">
        <svg class="drone-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Braços do drone -->
            <line x1="100" y1="100" x2="30" y2="40" stroke="#667eea" stroke-width="6" stroke-linecap="round"/>
            <line x1="100" y1="100" x2="170" y2="40" stroke="#667eea" stroke-width="6" stroke-linecap="round"/>
            <line x1="100" y1="100" x2="30" y2="160" stroke="#667eea" stroke-width="6" stroke-linecap="round"/>
            <line x1="100" y1="100" x2="170" y2="160" stroke="#667eea" stroke-width="6" stroke-linecap="round"/>
            
            <!-- Hélices -->
            <g class="propeller-svg prop1">
                <line x1="10" y1="40" x2="50" y2="40" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                <line x1="30" y1="20" x2="30" y2="60" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                <circle cx="30" cy="40" r="5" fill="#764ba2"/>
            </g>
            <g class="propeller-svg prop2">
                <line x1="150" y1="40" x2="190" y2="40" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                <line x1="170" y1="20" x2="170" y2="60" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                <circle cx="170" cy="40" r="5" fill="#764ba2"/>
            </g>
            <g class="propeller-svg prop3">
                <line x1="10" y1="160" x2="50" y2="160" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                <line x1="30" y1="140" x2="30" y2="180" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                <circle cx="30" cy="160" r="5" fill="#764ba2"/>
            </g>
            <g class="propeller-svg prop4">
                <line x1="150" y1="160" x2="190" y2="160" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                <line x1="170" y1="140" x2="170" y2="180" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                <circle cx="170" cy="160" r="5" fill="#764ba2"/>
            </g>
            
            <!-- Corpo do drone -->
            <rect x="75" y="75" width="50" height="50" rx="10" fill="url(#droneGrad)" stroke="#00d4ff" stroke-width="2"/>
            
            <!-- Luzes LED -->
            <circle cx="85" cy="85" r="4" fill="#ff0000">
                <animate attributeName="opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite"/>
            </circle>
            <circle cx="115" cy="85" r="4" fill="#00ff00">
                <animate attributeName="opacity" values="0.3;1;0.3" dur="0.7s" repeatCount="indefinite"/>
            </circle>
            <circle cx="85" cy="115" r="4" fill="#00ff00">
                <animate attributeName="opacity" values="1;0.3;1" dur="0.6s" repeatCount="indefinite"/>
            </circle>
            <circle cx="115" cy="115" r="4" fill="#ff6600">
                <animate attributeName="opacity" values="0.3;1;0.3" dur="0.8s" repeatCount="indefinite"/>
            </circle>
            
            <!-- Centro pulsante -->
            <circle cx="100" cy="100" r="12" fill="#00d4ff" opacity="0.8">
                <animate attributeName="r" values="12;16;12" dur="2s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
            </circle>
            
            <!-- Gradiente -->
            <defs>
                <linearGradient id="droneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#1a1a2e"/>
                    <stop offset="100%" style="stop-color:#16213e"/>
                </linearGradient>
            </defs>
        </svg>
    </div>
</div>


    </section>
</body>
</html>
